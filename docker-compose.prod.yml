# =============================================================================
# MOBIUS Wiki - Docker Compose (Production Override)
# =============================================================================
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file overrides the base docker-compose.yml for production:
#   - Adds nginx reverse proxy with SSL termination
#   - Removes direct port exposure (all traffic through nginx)
#   - Uses production environment settings
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database - Production Overrides
  # ---------------------------------------------------------------------------
  db:
    # Remove port exposure in production (only accessible within Docker network)
    ports: []
    # Add restart policy
    restart: always

  # ---------------------------------------------------------------------------
  # NestJS Backend - Production Overrides
  # ---------------------------------------------------------------------------
  backend:
    # Remove port exposure in production (only accessible within Docker network)
    ports: []
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      MAIL_TRANSPORT: ${MAIL_TRANSPORT:-smtp}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-MOBIUS Wiki}

  # ---------------------------------------------------------------------------
  # Angular Frontend - Production Overrides
  # ---------------------------------------------------------------------------
  frontend:
    # Remove port exposure in production (only accessible within Docker network)
    ports: []
    restart: always

  # ---------------------------------------------------------------------------
  # nginx Reverse Proxy (Production Only)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: mobius-nginx
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--no-verbose", "--tries=1", "--spider", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# -----------------------------------------------------------------------------
# Networks (explicit for production)
# -----------------------------------------------------------------------------
networks:
  default:
    name: mobius-network
