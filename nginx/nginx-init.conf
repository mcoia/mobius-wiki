# =============================================================================
# MOBIUS Wiki - Initial nginx Configuration (HTTP Only)
# =============================================================================
# Use this config ONLY during initial certificate generation.
# After obtaining SSL certs, switch to nginx-multi.conf
#
# Usage:
#   1. Start with this config: nginx uses nginx-init.conf
#   2. Run make_certs.sh to get SSL certificates
#   3. Switch to nginx-multi.conf and restart nginx
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # HTTP Server for ACME challenges
    server {
        listen 80;
        listen [::]:80;
        server_name wiki-dev.mobiusconsortium.org wiki.mobiusconsortium.org;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
            try_files $uri =404;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy - awaiting SSL setup\n";
            add_header Content-Type text/plain;
        }

        # Everything else returns a message
        location / {
            return 503 "MOBIUS Wiki is being set up. SSL certificates are being generated.\n";
            add_header Content-Type text/plain;
        }
    }
}
