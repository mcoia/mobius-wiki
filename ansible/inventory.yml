---
# MOBIUS Wiki Ansible Inventory
#
# Configure your target server(s) here.
#
# Usage:
#   ansible-playbook -i inventory.yml playbook.yml

all:
  children:
    mobius_wiki:
      hosts:
        # Production server
        wiki-prod:
          ansible_host: "YOUR_SERVER_IP_HERE"
          ansible_user: "YOUR_SSH_USER"
          ansible_ssh_private_key_file: "~/.ssh/id_rsa"

          # Override variables for this host if needed
          # domain_name: "wiki.mobius.org"

      vars:
        # Common variables for all mobius_wiki hosts
        ansible_python_interpreter: /usr/bin/python3
