<div class="error-page">
  <div class="error-content">
    <h1 class="error-code">403</h1>
    <h2 class="error-title">Access Denied</h2>

    @if (isAuthenticated$ | async) {
      <p class="error-message">
        You don't have permission to view this content.
        If you believe this is an error, please contact your administrator.
      </p>
      <div class="error-actions">
        <button class="btn-primary" (click)="goHome()">Go to Home</button>
        <button class="btn-secondary" (click)="goBack()">Go Back</button>
      </div>
    } @else {
      <p class="error-message">
        This content requires authentication. Please log in to continue.
      </p>
      <div class="error-actions">
        <button class="btn-primary" (click)="login()">Log In</button>
        <button class="btn-secondary" (click)="goHome()">Go to Home</button>
      </div>
    }
  </div>
</div>
