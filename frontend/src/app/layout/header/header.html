<header class="top-header">
  <div class="logo">
    <a routerLink="/">MOBIUS</a>
  </div>

  <!-- Search box - centered in header -->
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text"
           placeholder="Search documentation..."
           [(ngModel)]="searchQuery"
           (keydown)="onSearchKeydown($event)">
  </div>

  <!-- User menu -->
  <div class="user-menu-container">
    @if (currentUser$ | async; as user) {
      <!-- Authenticated user -->
      <div class="user-menu">
        @if (user.role === 'site_admin') {
          <a routerLink="/admin" class="admin-link" title="Admin Panel">
            <i class="fas fa-cog"></i>
          </a>
        } @else if (user.role === 'mobius_staff') {
          <a routerLink="/staff" class="admin-link" title="Staff Panel">
            <i class="fas fa-cog"></i>
          </a>
        }
        <a routerLink="/profile" class="profile-link" title="My Profile">
          <i class="fas fa-user"></i> {{ user.name }}
        </a>
        <button class="logout-btn" (click)="logout()" type="button">
          Logout
        </button>
      </div>
    } @else {
      <!-- Guest user -->
      <a routerLink="/login" class="user-link">
        <i class="fas fa-user"></i> Login
      </a>
    }
  </div>
</header>
