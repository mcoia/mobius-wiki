<header class="top-header">
  <div class="logo">
    <a routerLink="/">MOBIUS<sup>®</sup></a>
  </div>

  <div class="top-nav">
    <a routerLink="/wiki">Browse Wikis</a>
    <a routerLink="/wiki/site/main/home">Home</a>

    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Search...">
    </div>

    <!-- User menu - show login or user info based on auth state -->
    @if (currentUser$ | async; as user) {
      <!-- Authenticated user -->
      <div class="user-menu">
        <span class="user-name">
          <i class="fas fa-user"></i> {{ user.name }}
        </span>
        <button class="logout-btn" (click)="logout()" type="button">
          Logout
        </button>
      </div>
    } @else {
      <!-- Guest user -->
      <a routerLink="/login" class="user-link">
        <i class="fas fa-user"></i> Login
      </a>
    }
  </div>
</header>
