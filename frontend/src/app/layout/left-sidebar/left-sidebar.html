<nav class="left-sidebar">
  <!-- Dynamic Wiki List -->
  @if (wikis$ | async; as wikis) {
    @if (wikis.length > 0) {
      <div class="nav-section-title">WIKIS</div>
      <ul class="nav-menu">
        @for (wiki of wikis; track wiki.id) {
          <li>
            <a [routerLink]="['/wiki', wiki.slug]" [class.active]="isWikiActive(wiki.slug)">
              {{ wiki.title }}
            </a>
          </li>
        }
      </ul>
    }
  } @else {
    <div class="nav-section-title">Loading...</div>
  }

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="footer-links">
      <a routerLink="/wiki/site/main/home">Home</a>
      <a routerLink="/wiki/site/main/about">About</a>
      <a routerLink="/wiki/site/main/help">Help</a>
      <a routerLink="/wiki/site/main/contact">Contact</a>
      <a routerLink="/wiki/site/main/terms">Terms</a>
      <a routerLink="/wiki/site/main/privacy">Privacy</a>
    </div>
    <span class="copyright">&copy; 2026 MOBIUS</span>
  </div>
</nav>
