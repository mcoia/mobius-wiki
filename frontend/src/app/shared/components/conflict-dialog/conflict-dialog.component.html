@if (config) {
  <div class="modal-overlay" (click)="onCancel()">
    <div class="modal-content conflict-dialog" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <span class="dialog-icon">&#9888;</span>
        <h2>Save Conflict</h2>
      </div>
      <div class="modal-body">
        <p class="conflict-message">
          This page was modified while you were editing.
        </p>
        <div class="conflict-details">
          <div class="detail-row">
            <span class="detail-label">Last saved by:</span>
            <span class="detail-value">{{ config.lastModifiedBy }}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Saved at:</span>
            <span class="detail-value">{{ formatDate(config.lastModifiedAt) }}</span>
          </div>
        </div>
        <p class="conflict-warning">
          Your changes will overwrite their work if you save now.
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="onCancel()">
          Cancel
        </button>
        <button type="button" class="btn-outline" (click)="onViewChanges()">
          View Their Changes
        </button>
        <button type="button" class="btn-warning" (click)="onSaveAnyway()">
          Save Anyway
        </button>
      </div>
    </div>
  </div>
}
