<!-- Custom Toolbar -->
<div id="quill-toolbar" class="custom-toolbar" [class.source-mode-active]="isSourceMode">
  <!-- Format dropdown -->
  <span class="ql-formats">
    <select class="ql-header">
      <option selected>Normal</option>
      <option value="1">Heading 1</option>
      <option value="2">Heading 2</option>
      <option value="3">Heading 3</option>
    </select>
  </span>

  <!-- Text formatting with Lucide icons -->
  <span class="ql-formats">
    <button class="ql-bold" title="Bold">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
        <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
      </svg>
    </button>
    <button class="ql-italic" title="Italic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" x2="10" y1="4" y2="4"/>
        <line x1="14" x2="5" y1="20" y2="20"/>
        <line x1="15" x2="9" y1="4" y2="20"/>
      </svg>
    </button>
    <button class="ql-underline" title="Underline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 4v6a6 6 0 0 0 12 0V4"/>
        <line x1="4" x2="20" y1="20" y2="20"/>
      </svg>
    </button>
    <button class="ql-strike" title="Strikethrough">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 4H9a3 3 0 0 0-2.83 4"/>
        <path d="M14 12a4 4 0 0 1 0 8H6"/>
        <line x1="4" x2="20" y1="12" y2="12"/>
      </svg>
    </button>
  </span>

  <!-- Color pickers -->
  <span class="ql-formats">
    <input type="color" class="ql-color-picker" value="#333333" title="Text Color" (change)="applyColor('color', $event)">
    <input type="color" class="ql-background-picker" value="#ffff00" title="Highlight Color" (change)="applyColor('background', $event)">
  </span>

  <!-- Lists with Lucide icons -->
  <span class="ql-formats">
    <button class="ql-list" value="ordered" title="Numbered List">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="10" x2="21" y1="6" y2="6"/>
        <line x1="10" x2="21" y1="12" y2="12"/>
        <line x1="10" x2="21" y1="18" y2="18"/>
        <path d="M4 6h1v4"/>
        <path d="M4 10h2"/>
        <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/>
      </svg>
    </button>
    <button class="ql-list" value="bullet" title="Bulleted List">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" x2="21" y1="6" y2="6"/>
        <line x1="8" x2="21" y1="12" y2="12"/>
        <line x1="8" x2="21" y1="18" y2="18"/>
        <circle cx="3" cy="6" r="1" fill="currentColor"/>
        <circle cx="3" cy="12" r="1" fill="currentColor"/>
        <circle cx="3" cy="18" r="1" fill="currentColor"/>
      </svg>
    </button>
    <button class="ql-indent" value="-1" title="Decrease Indent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="7 8 3 12 7 16"/>
        <line x1="21" x2="11" y1="12" y2="12"/>
        <line x1="21" x2="11" y1="6" y2="6"/>
        <line x1="21" x2="11" y1="18" y2="18"/>
      </svg>
    </button>
    <button class="ql-indent" value="+1" title="Increase Indent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 8 7 12 3 16"/>
        <line x1="21" x2="11" y1="12" y2="12"/>
        <line x1="21" x2="11" y1="6" y2="6"/>
        <line x1="21" x2="11" y1="18" y2="18"/>
      </svg>
    </button>
  </span>

  <!-- Alignment - 3 SEPARATE BUTTONS -->
  <span class="ql-formats">
    <button class="ql-align" value="" title="Align Left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="21" x2="3" y1="6" y2="6"/>
        <line x1="15" x2="3" y1="12" y2="12"/>
        <line x1="17" x2="3" y1="18" y2="18"/>
      </svg>
    </button>
    <button class="ql-align" value="center" title="Align Center">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="21" x2="3" y1="6" y2="6"/>
        <line x1="17" x2="7" y1="12" y2="12"/>
        <line x1="19" x2="5" y1="18" y2="18"/>
      </svg>
    </button>
    <button class="ql-align" value="right" title="Align Right">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="21" x2="3" y1="6" y2="6"/>
        <line x1="21" x2="9" y1="12" y2="12"/>
        <line x1="21" x2="7" y1="18" y2="18"/>
      </svg>
    </button>
  </span>

  <!-- Link & Clear -->
  <span class="ql-formats">
    <button class="ql-link" title="Insert Link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>
    <button class="ql-clean" title="Clear Formatting">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 7V4h16v3"/>
        <path d="M9 20h6"/>
        <path d="M12 4v16"/>
        <path d="m17 3 4 4"/>
        <path d="m3 21 18-18"/>
      </svg>
    </button>
  </span>

  <!-- Undo/Redo -->
  <span class="ql-formats">
    <button type="button" class="custom-undo" (click)="undo()" title="Undo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 7v6h6"/>
        <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
      </svg>
    </button>
    <button type="button" class="custom-redo" (click)="redo()" title="Redo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 7v6h-6"/>
        <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/>
      </svg>
    </button>
  </span>

  <!-- Insert Dropdown -->
  <span class="ql-formats">
    <div class="insert-dropdown-wrapper">
      <button type="button" class="insert-dropdown-btn" (click)="toggleInsertMenu($event)" title="Insert Element">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14"/>
          <path d="M5 12h14"/>
        </svg>
        <span>Insert</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 12px; height: 12px;">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>

      @if (showInsertMenu) {
        <div class="insert-menu" (click)="$event.stopPropagation()">
          <div class="insert-menu-section">Content Blocks</div>
          <div class="insert-menu-item" (click)="insertElement('callout')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8h12"/><path d="M6 12h12"/><path d="M6 16h12"/><rect x="3" y="4" width="18" height="16" rx="2"/></svg>
            <span>Callout Box</span>
            <small>Teal accent</small>
          </div>
          <div class="insert-menu-item" (click)="insertElement('note')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            <span>Note Box</span>
            <small>Gray info</small>
          </div>
          <div class="insert-menu-item" (click)="insertElement('stats')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
            <span>Stats Grid</span>
            <small>3 columns</small>
          </div>

          <div class="insert-menu-section">Typography</div>
          <div class="insert-menu-item" (click)="insertElement('h1')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h8"/><path d="M4 4v16"/><path d="M12 4v16"/><path d="M17 12v8"/><path d="M21 12v8"/><path d="M17 12h4"/></svg>
            <span>Heading 1</span>
            <small>Page title</small>
          </div>
          <div class="insert-menu-item" (click)="insertElement('h2')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h8"/><path d="M4 4v16"/><path d="M12 4v16"/><path d="M21 18h-4c0-4 4-3 4-6 0-1.5-2-2.5-4-1"/></svg>
            <span>Heading 2</span>
            <small>Section</small>
          </div>
          <div class="insert-menu-item" (click)="insertElement('h3')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h8"/><path d="M4 4v16"/><path d="M12 4v16"/><path d="M17.5 10.5c1.7-1 3.5 0 3.5 1.5a2 2 0 0 1-2 2"/><path d="M17 17.5c2 1.5 4 .3 4-1.5a2 2 0 0 0-2-2"/></svg>
            <span>Heading 3</span>
            <small>Subsection</small>
          </div>
          <div class="insert-menu-item" (click)="insertElement('paragraph')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 4v16"/><path d="M17 4v16"/><path d="M19 4H9.5a4.5 4.5 0 0 0 0 9H13"/></svg>
            <span>Paragraph</span>
            <small>Body text</small>
          </div>

          <div class="insert-menu-section">Lists</div>
          <div class="insert-menu-item" (click)="insertElement('ul')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
            <span>Bullet List</span>
            <small>Unordered</small>
          </div>
          <div class="insert-menu-item" (click)="insertElement('ol')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
            <span>Numbered List</span>
            <small>Ordered</small>
          </div>

          <div class="insert-menu-section">Other</div>
          <div class="insert-menu-item" (click)="insertElement('divider')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18"/></svg>
            <span>Divider</span>
            <small>Horizontal line</small>
          </div>
        </div>
      }
    </div>
  </span>

  <!-- Source Mode -->
  <span class="ql-formats">
    <button type="button" class="source-mode-btn" (click)="toggleSourceMode()" title="View/Edit HTML Source">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"/>
        <polyline points="8 6 2 12 8 18"/>
      </svg>
    </button>
  </span>
</div>

<!-- Quill Editor -->
<quill-editor
  [hidden]="isSourceMode"
  [modules]="quillConfig"
  [placeholder]="placeholder"
  [ngModel]="value"
  (onContentChanged)="onContentChanged($event)"
  (onEditorCreated)="onEditorCreated($event)"
  [disabled]="disabled"
  class="quill-editor-container">
</quill-editor>

<!-- Source Mode Editor -->
<textarea
  [hidden]="!isSourceMode"
  [(ngModel)]="value"
  (input)="onSourceChange()"
  class="source-editor"
  [disabled]="disabled"
  [placeholder]="placeholder">
</textarea>
