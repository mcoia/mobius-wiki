<div class="editor-container">
  <!-- TinyMCE Editor (hidden when in source mode) -->
  <div [hidden]="isSourceMode" class="visual-editor">
    <editor
      #editor
      [init]="tinymceConfig"
      (onInit)="onEditorInit($event)"
      [initialValue]="content">
    </editor>
  </div>

  <!-- Source Mode (with toolbar and textarea) -->
  <div [hidden]="!isSourceMode" class="source-mode-container">
    <!-- Source toolbar with back button -->
    <div class="source-toolbar">
      <button type="button" class="source-back-btn" (click)="toggleSourceMode()">
        ← Back to Visual Editor
      </button>
    </div>

    <!-- Source textarea -->
    <textarea
      [(ngModel)]="sourceContent"
      (input)="onSourceChange()"
      class="source-editor"
      [placeholder]="placeholder">
    </textarea>
  </div>
</div>
