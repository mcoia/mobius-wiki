<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b6cb0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="200" fill="rgba(255,255,255,0.05)"/>

  <!-- MOBIUS text -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="700" fill="white" text-anchor="middle">MOBIUS</text>

  <!-- Wiki subtitle -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="400" fill="rgba(255,255,255,0.9)" text-anchor="middle">Wiki</text>

  <!-- Tagline -->
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="300" fill="rgba(255,255,255,0.7)" text-anchor="middle">Collaborative Documentation for Libraries</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(255,255,255,0.1)"/>
</svg>
